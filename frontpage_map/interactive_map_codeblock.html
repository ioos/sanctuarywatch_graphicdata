    html, body {
    margin: 0;
    padding: 0;
    }

    /* #app is now the map wrapper */
    #app{
    position:relative;
    width: 100%;
    height: 75vh;
    margin-left: 0;
    margin-right: 0;
    /* border: 1px solid #ccc; */
    /* border-radius: 10px; */
    overflow: hidden; 
    }

    #app.is-loading {
        pointer-events: none;
        user-select: none;
    }

    #app-loader.loader-wrapper {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: rgba(26, 26, 26, 0.82);
        z-index: 99999;
        opacity: 1;
        visibility: visible;
        pointer-events: all;
        transition: opacity 0.25s ease, visibility 0.25s ease;
    }

    #app-loader.loader-wrapper.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
    }

    #app-loader .spinner {
        width: 60px;
        height: 60px;
        border: 6px solid #444;
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 1rem;
    }

    #app-loader .loading-text {
        color: #fff;
        font-size: 1.5rem;
        animation: fadeInOut 2s ease-in-out infinite;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    @keyframes fadeInOut {
        0%, 100% { opacity: 0.45; }
        50% { opacity: 1; }
    }

    /* Leaflet map fills the wrapper */
    #map{
    width: 100%;
    height: 100%;
    }

    /* Sidebar OVERLAY inside the map (right side, full height) */
    #sidebar{
    position: absolute;
    top: 10px;
    right: 10px;
    height: 16%;
    width: 30%;

    box-sizing: border-box;
    z-index: 1000;
    font-family: Arial, Helvetica, sans-serif;
    overflow: hidden;
    }

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="

  <script>

    /**
     * -------------------------------------------------------------------------
     * WHAT THIS SCRIPT DOES
     * -------------------------------------------------------------------------
     * 1) Creates a Leaflet map.
     * 2) Adds the free EOX Sentinel-2 Cloudless basemap (XYZ tiles).
     * 3) Adds clickable sanctuary markers with a popup containing an image + link.
     * 4) Loads MULTIPLE GeoJSON files (polygons) and draws them with styling.
     *
     * NOTE ON "SATELLITE" FOR FREE
     * - EOX S2 Cloudless is a global mosaic that looks like satellite imagery.
     * - It's delivered as standard XYZ tiles in Web Mercator (EPSG:3857),
     *   which Leaflet supports directly.
     *
     * IMPORTANT LOCAL DEV NOTE
     * - If you open this file as file://..., fetch() will fail in Firefox.
     *   Use a local server:
     *     python3 -m http.server 8000
     *   Then open via:
     *     http://localhost:8000/interactive_map.html
     * -------------------------------------------------------------------------
     */


    // ----------------------------
    // 3) MISC SUPPORTING FUNCTIONS
    // ----------------------------

    function resetAllDots() {
        if (!dotsLayer) return;

        dotsLayer.eachLayer((layer) => {

            if (layer.sanctuaryData.status === 'active') {
                if (layer && typeof layer.setStyle === "function") {

                    if (layer.sanctuaryData.type === 'sanctuary'){
                        layer.setStyle({
                            color: dotStyleActive.color,
                            fillColor: dotStyleActive.fillColor,
                            weight: dotStyleActive.weight,
                            fillOpacity: dotStyleActive.fillOpacity
                        });
                    }
                    if (layer.sanctuaryData.type === 'designation'){
                        layer.setStyle({
                            color: dotStyleDesignation.color,
                            fillColor: dotStyleDesignation.fillColor,
                            weight: dotStyleDesignation.weight,
                            fillOpacity: dotStyleDesignation.fillOpacity
                        });
                    }
                }
            }
            if (layer.sanctuaryData.status === 'inactive') {
                if (layer && typeof layer.setStyle === "function") {
                    layer.setStyle({
                        color: dotStyleInactive.color,
                        fillColor: dotStyleInactive.fillColor,
                        weight: dotStyleInactive.weight,
                        fillOpacity: dotStyleInactive.fillOpacity
                    });
                }
            }
        });

        // if you're tracking an active dot elsewhere
        if (typeof activeDot !== "undefined") activeDot = null;
    }

    function bindGroupTooltip(group, text) {
        group.eachLayer((layer) => {
            if (!layer.bindTooltip) return;

            layer.unbindTooltip();

            layer.bindTooltip(text, {
                permanent: false,
                direction: "relative",
                offset: L.point(-10, 0),
                opacity: 0.95,
                className: "dot-label",
                sticky: true
            });
        });
    }

    function applyGroupStyle(group, s, tooltipText = null) {
        group.eachLayer((l) => {
            if (l.setStyle) {
                l.setStyle(s);
            }
        });

        if (tooltipText) {
            bindGroupTooltip(group, tooltipText);
        }
    }

    function activeStyleFrom(base) {
        return {
            color: "yellow",
            fillColor: "yellow",
            weight: 2.5,
            fillOpacity: Math.max(base.fillOpacity ?? 0.09, 0.09)
        };
    }

    function inactiveStyleFrom(base) {
        return {
            color: "white",
            fillColor: "white",
            weight: 2.5,
            fillOpacity: Math.max(base.fillOpacity ?? 0.09, 0.09)
        };
    }

    function clearActiveSanctuary() {
        if (activeSanctuaryName && sanctuaryLayers.has(activeSanctuaryName)) {
            const prev = sanctuaryLayers.get(activeSanctuaryName);

            prev.group.eachLayer((l) => {
                if (l.setStyle) {
                    l.setStyle(prev.style);
                }
            });

            bindGroupTooltip(prev.group, `Select ${prev.sanctuary.name}`);
        }

        activeSanctuaryName = null;

        const sel = document.getElementById("sanctuarySelect");
        if (sel) sel.value = "";

        const panel = document.getElementById("info-panel");
        if (panel) panel.classList.add("hidden");

        selectedSanctuary = undefined;
        resetAllDots();

        const sidebar = document.getElementById("sidebar");
        sidebar.style.backdropFilter = "";
        sidebar.style.webkitBackdropFilter = "";
        sidebar.style.backgroundColor = "";
        sidebar.style.height = "";
        sidebar.style.width = "";
        sidebar.style.borderRadius = "";
        sidebar.style.backgroundColor = "";
    }


    function renderGeojsonList(name, { triggerChange = false } = {}) {
        if (!name) return;

        activeSanctuaryName = name;

        // Update dropdown UI
        if (sanctuarySelect) sanctuarySelect.value = name;

        // If you also have a mobile select, keep it in sync
        const mobileSelect = document.getElementById("mobileSelect");
        if (mobileSelect) mobileSelect.value = name;

        // Optionally run the same behavior as manual dropdown selection
        if (triggerChange && sanctuarySelect) {
            sanctuarySelect.dispatchEvent(new Event("change", { bubbles: true }));
        }
    }


    function dotsAreVisible() {
        return typeof dotsLayer !== "undefined" && map.hasLayer(dotsLayer);
    }


    function setActiveSanctuary(name) {

        if (!name || !sanctuaryLayers.has(name)) return;

        // Reset old
        if (activeSanctuaryName && activeSanctuaryName !== name) {
            const prev = sanctuaryLayers.get(activeSanctuaryName);
            if (prev) applyGroupStyle(prev.group, prev.style, `Select ${activeSanctuaryName}`);
        }

        // Set new
        const entry = sanctuaryLayers.get(name);

        if (entry.sanctuary.url != '') {
            applyGroupStyle(entry.group, activeStyleFrom(entry.style), `Open ${name}`);
        }
        if (entry.sanctuary.url === '') {
            applyGroupStyle(entry.group, activeStyleFrom(entry.style), `${name} is coming soon`);
        }
        // applyGroupStyle(entry.group, activeStyleFrom(entry.style));
        // entry.group.bringToFront();
        renderGeojsonList(name); // update active state in sidebar

        let entryLat = entry.sanctuary.zoomlat;
        let entryLon = entry.sanctuary.zoomlon;
        let entryZoom;
        if (!isMobile()) {
            entryZoom = entry.sanctuary.zoom;
        }
        if (isMobile()) {
            try {
                entryZoom = entry.sanctuary.mobileZoom;
            } catch {
                entryZoom = sanctuary.mobileZoom;
            }
        }

        requestAnimationFrame(() => {
            map.invalidateSize();

            requestAnimationFrame(() => {
                map.setView([entryLat, entryLon], entryZoom, { animate: true });
            });
        });

        activeSanctuaryName = name;
        selectedSanctuary = name;

        return selectedSanctuary, activeSanctuaryName;
    }

    function openPanel(sanctuary) {
        const status = sanctuary.status;
        const imgUrl = (sanctuary.image || "").trim();
        const rawUrl = sanctuary.url ?? "";
        const url = String(rawUrl).trim();
        const type = sanctuary.type;

        const hasUrl =
            url.length > 0 &&
            url !== "#" &&
            url.toLowerCase() !== "null" &&
            url.toLowerCase() !== "undefined";

        const isInactive = status === "inactive";

        const imageHtml = isInactive
            ? ``
            : imgUrl
                ? (hasUrl
                    ? `
                    <a class="sw-panel-img-link" href="${url}" target="_self" rel="noopener">
                        <img
                            class="sw-panel-img"
                            src="${imgUrl}"
                            alt="${sanctuary.name}"
                            loading="lazy"
                            referrerpolicy="no-referrer"
                            onerror="this.style.display='none';"
                        />
                    </a>
                    `
                    : `
                    <img
                        class="sw-panel-img"
                        src="${imgUrl}"
                        alt="${sanctuary.name}"
                        loading="lazy"
                        referrerpolicy="no-referrer"
                        onerror="this.style.display='none';"
                    />
                    `
                )
                : `
                <div style="padding:18px; font-weight:700; color:#043161;">
                    No image provided
                </div>
                `;

                let bannerHtml = "";

                if (isInactive) {
                    bannerHtml = `
                        <div class="sw-panel-banner no-url">
                            ${sanctuary.name}<br><em>Tool is unavailable</em>
                        </div>
                    `;

    function syncSanctuaryDropdown() {
        if (!sanctuarySelect) return;

        const current = sanctuarySelect.value;

        sanctuarySelect.innerHTML = `<option value="">Select a sanctuary…</option>`;

        const items = [...sanctuaryLayers.entries()]
            .map(([name, obj]) => {
            const raw = obj?.sanctuary?.url ?? "";
            const visitUrl = String(raw).trim();

            const hasUrl =
                visitUrl.length > 0 &&
                visitUrl !== "#" &&
                visitUrl.toLowerCase() !== "null" &&
                visitUrl.toLowerCase() !== "undefined";

            return { name, displayName: name, hasUrl };
            })
            .sort((a, b) => a.displayName.localeCompare(b.displayName));

        items.forEach(item => {
            const opt = document.createElement("option");
            opt.value = item.name;
            opt.textContent = item.hasUrl ? item.displayName : `${item.displayName}`;
            sanctuarySelect.appendChild(opt);
        });

        // restore selection if still valid
        if ([...sanctuaryLayers.keys()].includes(current)) sanctuarySelect.value = current;
    }

    function getMobileState() {
        const byWidthLess768 = window.matchMedia("(max-width: 768px)").matches;
        const byHeightLess500 = window.matchMedia("(max-height: 500px)").matches;
        const byHeightGreater960 = window.matchMedia("(min-height: 960px) and (max-width: 1024px)").matches;
        const hasTouch = navigator.maxTouchPoints > 0 || "ontouchstart" in window;
        const mobileType = /Mobi|Android|iPhone/i.test(navigator.userAgent);

        return {
            byWidthLess768,
            byHeightLess500,
            byHeightGreater960,
            hasTouch,
            mobileType,
            isMobile: hasTouch && (byWidthLess768 || byHeightLess500 || byHeightGreater960)
        };
    }

    function isMobile() {
        return getMobileState().isMobile;
    }

    const mobileState = getMobileState();

    function getTabletState() {
        const byWidthTablet = window.matchMedia("(min-width: 601px) and (max-width: 1100px)").matches;
        const byHeightTablet = window.matchMedia("(min-height: 500px) and (max-height: 1400px)").matches;
        const hasTouch = navigator.maxTouchPoints > 0 || "ontouchstart" in window;

        return {
            byWidthTablet,
            byHeightTablet,
            hasTouch,
            isTablet: !isMobile() && hasTouch && byWidthTablet && byHeightTablet
        };
    }

    function isTablet() {
        return getTabletState().isTablet;
    }
    const tabletState = getTabletState();

    // ----------------------------

    // ----------------------------
    async function addGeojsonLayer({ name, jsonUrl, pane, style, image, url, buttonName, status, lat, lon, zoom, mobileZoom, type,  zoomlat, zoomlon}) {
        const res = await fetch(jsonUrl);
        if (!res.ok) throw new Error(`Failed to load ${jsonUrl} (HTTP ${res.status})`);
        const geojson = await res.json();

        const displayName = name;

        // Create the group for this GeoJSON file
        const group = L.geoJSON(geojson, {
            pane,
            style: () => style
        }).addTo(map);

        let sanctuary = {name, jsonUrl, pane, style, image, url, buttonName, status, lat, lon, zoom, mobileZoom, type, zoomlat, zoomlon};

        // REGISTER THIS GROUP so sidebar can render it
        if (status === 'active') {
            sanctuaryLayers.set(displayName, { group, style, jsonUrl, sanctuary });
            syncSanctuaryDropdown();
        }

        // Helper: apply style to all polygons in this GeoJSON group
        const setGroupStyle = (s) => {
            group.eachLayer(layer => layer.setStyle && layer.setStyle(s));
        };

        // Hover styles
        const hoverStyle = {
            color: "yellow",
            fillColor: "yellow",
            weight: 2.5,
            fillOpacity: Math.max(style.fillOpacity ?? 0.05, 0.05)
        };
        const hoverStyleInactive = {
            color: "white",
            fillColor: "white",
            weight: 2.5,
            fillOpacity: Math.max(style.fillOpacity ?? 0.05, 0.05)
        };

        let resetTimer = null;



        // Helper Functions
        const highlightGroup = () => {
            if (resetTimer) { clearTimeout(resetTimer); resetTimer = null; }
            setGroupStyle(hoverStyle);
            // group.bringToFront();
        };

        const highlightGroupInactive = () => {
            if (resetTimer) { clearTimeout(resetTimer); resetTimer = null; }
            setGroupStyle(hoverStyleInactive);
            // group.bringToFront();
        };

        const scheduleReset = () => {
            if (resetTimer) clearTimeout(resetTimer);

            // If this group is "active"/selected in the sidebar, don't reset on mouseout
            if (activeSanctuaryName === displayName) return;

            resetTimer = setTimeout(() => setGroupStyle(style), 60);
        };


        // LOOP THROUGH THE DICT OF SANCTUARIES
        // Attach events to EACH feature layer, but operate on the GROUP
        group.eachLayer(featureLayer => {

            // bind popup once (safe) — but we will conditionally OPEN it

            //LOGIC FOR DICT ENTRIES WITH A URL
            if (sanctuary.url != "") {

                let selectedSanctuary;

                //DESKTOP LOGIC
                if (!isMobile()) {


                    featureLayer.bindTooltip(`Select ${sanctuary.name}`, {
                        permanent: false,        // not always on
                        direction: "relative",
                        offset: L.point(-10, 0),
                        opacity: 0.95,
                        className: "dot-label",
                        sticky: true  
                    });

                    
                    // Show name to the LEFT of the dot
                    featureLayer.on("mouseover", (e) => {
                        highlightGroup();
                    });

                    featureLayer.on("mouseout", () => {
                        if (activeSanctuaryName !=  sanctuary.name) {
                            // Only close if we opened (safe either way)
                            scheduleReset();
                        }
                    });
                                           

                    featureLayer.on("click", (e) => {

                        if (activeSanctuaryName === sanctuary.name) {
                            // Prevent map click from clearing selection
                            L.DomEvent.stopPropagation(e);

                            // Select sanctuary (keep highlighted)
                            setActiveSanctuary(displayName);
                            renderGeojsonList(displayName); // update sidebar as each layer loads


                            if (setActiveSanctuary && status === 'active') {
                                openPanel(sanctuary);
                                // Optional: open link on click (only if you want)
                                if (sanctuary?.url) window.open(sanctuary.url, "_self");
                            }

                            // If dots are showing, DO NOT open polygon popups / DO NOT navigate
                            if (dotsAreVisible()) return;
                        } else {
                            // Prevent map click from clearing selection
                            L.DomEvent.stopPropagation(e);

                            // Select sanctuary (keep highlighted)
                            setActiveSanctuary(displayName);
                            renderGeojsonList(displayName); // update sidebar as each layer loads

                            if (setActiveSanctuary && status === 'active') {
                                openPanel(sanctuary);
                            }

                            // If dots are showing, DO NOT open polygon popups / DO NOT navigate
                            if (dotsAreVisible()) return;

                        }
                    });
                }

                //MOBILE LOGIC
                
                if (isMobile()) {
                    featureLayer.on("click", (e) => {
                        L.DomEvent.stopPropagation(e);

                        // If dots are showing, do not open polygon popups / do not navigate
                        if (dotsAreVisible()) return;

                        const alreadyActive = activeSanctuaryName === displayName;

                        highlightGroup();
                        setActiveSanctuary(displayName);
                        openPanel(sanctuary);

                        // First tap = select only
                        // Second tap on the same active feature = navigate
                        if (alreadyActive && sanctuary?.url) {
                            window.location.href = sanctuary.url;
                        }
                    });
                }

            //LOGIC FOR DICT ENTRIES WITHOUT A URL
            } else {
                //COMING SOON SANCTUARIES
                if (status === 'active') {

                    featureLayer.bindTooltip(`${sanctuary.name} is coming soon`, {
                        permanent: false,        // not always on

                    });

                        highlightGroup();
                    });

                    featureLayer.on("mouseout", () => {
                        // Only close if we opened (safe either way)
                        scheduleReset();
                    });

                    featureLayer.on("click", (e) => {
                        // Prevent map click from clearing selection
                        L.DomEvent.stopPropagation(e);

                        // Select sanctuary (keep highlighted)
                        setActiveSanctuary(displayName);
                        renderGeojsonList(displayName); // update sidebar as each layer loads


                        if (setActiveSanctuary && status === 'active') {
                            openPanel(sanctuary);

                            // if (sanctuary?.url) window.open(sanctuary.url, "_self");

                    // Show name to the LEFT of the dot

                        highlightGroupInactive();
                    });

                    });

                        map.setView([entryLat, entryLon], entryZoom, { animate: true });
                        
                    });

                    featureLayer.bindTooltip(`${sanctuary.name} is unavailable`, {
                        permanent: false,        // not always on
                        direction: "relative",
                        offset: L.point(-10, 0),
                        opacity: 0.95,
                        className: "dot-label"
                    });
                    
                }

            }
        });


        //Hide the GEOJSON after a certain zoom levels
        let HIDE_GEOJSON_AT_ZOOM = 5;

        if (isMobile()) {
            HIDE_GEOJSON_AT_ZOOM = 5;
        }

        function updateBoudaryVisibility() {
            const z = map.getZoom();
            if (z < HIDE_GEOJSON_AT_ZOOM) {
                if (map.hasLayer(group)) map.removeLayer(group);
            } else {
                if (!map.hasLayer(group)) map.addLayer(group);
            }
        }
        map.on("zoomend", updateBoudaryVisibility);
        updateBoudaryVisibility(); // run once at start

        return group;
    }

    function showAppLoader() {
        const loader = document.getElementById("app-loader");
        const app = document.getElementById("app");

        if (loader) {
            loader.classList.remove("is-hidden");
            loader.setAttribute("aria-busy", "true");
        }

        if (app) {
            app.classList.add("is-loading");
        }
    }

    function hideAppLoader() {
        const loader = document.getElementById("app-loader");
        const app = document.getElementById("app");

        if (loader) {
            loader.classList.add("is-hidden");
            loader.setAttribute("aria-busy", "false");
        }

        if (app) {
            app.classList.remove("is-loading");
        }
    }

    (async () => {
        showAppLoader();

        map.dragging.disable();
        map.touchZoom.disable();
        map.doubleClickZoom.disable();
        map.scrollWheelZoom.disable();
        map.boxZoom.disable();
        map.keyboard.disable();
        if (map.tap) map.tap.disable();

        const layers = [];

        try {
            for (const src of sanctuaries) {
                try {
                    const layer = await addGeojsonLayer(src);
                    layers.push(layer);
                } catch (err) {
                    console.error("GeoJSON load failed:", src.url, err);
                }
            }

            if (layers.length > 0) {
                const group = L.featureGroup(layers);
            }
        } finally {
            map.dragging.enable();
            map.touchZoom.enable();
            map.doubleClickZoom.enable();
            map.scrollWheelZoom.enable();
            map.boxZoom.enable();
            map.keyboard.enable();
            if (map.tap) map.tap.enable();

            hideAppLoader();
        }
    })();


    // ----------------------------
    // 9) ADD DISTANCE SCALE & MOUSE COORDINATES
    // ----------------------------


    let scaleControl = null;

    function buildScale() {
        if (scaleControl) {
            map.removeControl(scaleControl);
            scaleControl = null;
        }

        if (isMobile() || mobileState.byHeightGreater960 || mobileState.byHeightLess500 || mobileState.byWidthLess768) return;

        scaleControl = L.control.scale({
            position: "bottomleft",
            metric: false,
            imperial: true
        });

        scaleControl.addTo(map);
    }

    buildScale();
    window.addEventListener("resize", buildScale);


    const MouseCoords = L.Control.extend({
    options: { position: "bottomleft" },

    onAdd: function () {
        const div = L.DomUtil.create("div", "leaflet-control map-mouse-coords");
        div.innerHTML = `Lat: <span class="lat">—</span><br>Lon: <span class="lng">—</span>`;
        L.DomEvent.disableClickPropagation(div);
        return div;
    }
    });

    const mouseCoords = new MouseCoords();
    if (!isMobile() &&window.innerWidth > 768){
        map.addControl(mouseCoords);
        const coordsEl = document.querySelector(".map-mouse-coords");
        const latEl = coordsEl.querySelector(".lat");
        const lngEl = coordsEl.querySelector(".lng");

        map.on("mousemove", (e) => {
        latEl.textContent = e.latlng.lat.toFixed(5);
        lngEl.textContent = e.latlng.lng.toFixed(5);
        });

        // Optional: clear when mouse leaves map
        map.getContainer().addEventListener("mouseleave", () => {
        latEl.textContent = "—";
        lngEl.textContent = "—";
        });
    }

    

    // ----------------------------
    // 10) ADD MAP LEGEND
    // ----------------------------
    let legendPosition = "bottomleft";
    let legendControl = null;

    function buildLegend() {
        const z = map.getZoom();

        if (legendControl) {
            map.removeControl(legendControl);
            legendControl = null;
        }

        const LegendControl = L.Control.extend({
            options: { position: legendPosition },
            onAdd: function () {
                const div = L.DomUtil.create("div", "map-legend leaflet-control");

                if (!isMobile() &&window.innerWidth > 768 && z < 5) {
                    div.innerHTML = `
                    <div class="legend-title">Legend</div>

                    <div class="legend-row">
                        <span class="legend-dot"></span>

                    </div>

                    <div class="legend-row">

                        <span class="legend-label">New Sanctuary</span>
                    </div>

                    <div class="legend-row">
                        <span class="legend-dot-inactive"></span>
                        <span class="legend-label">Unavailable</span>
                    </div>
                    <div class="legend-compass">
                    <div class="compass-wrap">
                        <span class="compass-icon" title="North" aria-hidden="true">
                        <svg viewBox="0 0 24 24" role="img" focusable="false">
                            <path
                            d="M12 3 L18 10 H14 V21 H10 V10 H6 Z"

                            ></path>
                        </svg>
                        </span>
                        <span class="legend-label">North</span>
                    </div>
                    </div>
                    `;
                }

                if (!isMobile() &&window.innerWidth > 768 && z >= 5) {
                    div.innerHTML = `
                    <div class="legend-title">Legend</div>

                    <div class="legend-row">
                        <span class="legend-poly"></span>
                        <span class="legend-label">Condition Tracking</span>
                    </div>

                    <div class="legend-row">
                        <span class="legend-poly-designation"></span>
                        <span class="legend-label">New Sanctuary</span>
                    </div>

                    <div class="legend-row">
                        <span class="legend-poly-inactive"></span>
                        <span class="legend-label">Unavailable</span>
                    </div>
                    <div class="legend-compass">
                        <div class="compass-wrap">
                            <span class="compass-icon" title="North">
                                <svg viewBox="0 0 64 64" aria-hidden="true">
                                    <path d="M32 6 L44 34 L32 28 L20 34 Z"></path>
                                    <path d="M31 28 H33 V58 H31 Z"></path>
                                </svg>
                            </span>
                            <span class="legend-label">North</span>
                        </div>
                    </div>
                    `;
                }

                if (z < 5 && (isMobile() ||window.innerWidth < 768)) {
                    div.innerHTML = `
                    <div class="legend-rowline">
                        <div class="legend-row">
                            <span class="legend-dot"></span>
                            <span class="legend-label">Condition Tracking</span>
                        </div>

                        <div class="legend-row">
                            <span class="legend-dot-designation"></span>
                            <span class="legend-label">New Sanctuary</span>
                        </div>


                        <div class="legend-row">
                            <span class="legend-dot-inactive"></span>
                            <span class="legend-label">Unavailable</span>
                        </div>
                    </div>
                    `;
                }

                if (z >= 5 && (isMobile() ||window.innerWidth < 768)) {
                    div.innerHTML = `
                    <div class="legend-rowline">
                        <div class="legend-row">
                            <span class="legend-poly"></span>
                            <span class="legend-label">Condition Tracking</span>
                        </div>

                        <div class="legend-row">
                            <span class="legend-poly-designation"></span>
                            <span class="legend-label">New Sanctuary</span>
                        </div>

                        <div class="legend-row">
                            <span class="legend-poly-inactive"></span>
                            <span class="legend-label">Unavailable</span>
                        </div>
                    </div>
                    `;
                }

                L.DomEvent.disableClickPropagation(div);
                L.DomEvent.disableScrollPropagation(div);

                return div;
            }
        });

        legendControl = new LegendControl();
        map.addControl(legendControl);
    }

    buildLegend();

    map.on("zoomend", buildLegend);
    window.addEventListener("resize", buildLegend);

    


    // ----------------------------
    // 11) ADD FLASH INSTRUCTION ON FRONT SCREEN
    // ----------------------------
    function showOnboardingOnce() {
        const key = "sw_onboard_seen";
        if (sessionStorage.getItem(key) === "1") return;

        const app = document.getElementById("app");
        if (!app) {
            console.warn("[onboard] #app not found yet");
            return;
        }

        // build overlay
        const overlay = document.createElement("div");
        overlay.id = "sw-onboard";
        overlay.className = "sw-onboard";
        overlay.innerHTML = `
            <div class="sw-onboard-card">
            <div class="sw-onboard-title">Sanctuary Explorer</div>
            <ul class="sw-onboard-list">
                <li>Select a sanctuary</li>
                <li>Open selected tool</li>
            </ul>
            <button id="sw-onboard-btn" class="sw-onboard-btn" type="button">START EXPLORING</button>
            </div>
        `;

        app.appendChild(overlay);

        // OPTIONAL: block Leaflet interactions if map exists
        if (window.map && typeof map.dragging?.disable === "function") {
            map.dragging.disable();
            map.doubleClickZoom.disable();
            map.boxZoom.disable();
            map.keyboard.disable();
            if (map.tap) map.tap.disable();
            map.touchZoom.disable();
            // keep scrollWheel disabled if you already disable it globally
        }

        const close = () => {
            sessionStorage.setItem(key, "1");
            overlay.classList.add("fadeout");
            setTimeout(() => overlay.remove(), 260);

            if (window.map && typeof map.dragging?.enable === "function") {
            map.dragging.enable();
            map.doubleClickZoom.enable();
            map.boxZoom.enable();
            map.keyboard.enable();
            if (map.tap) map.tap.enable();
            map.touchZoom.enable();
            }
        };

        overlay.querySelector("#sw-onboard-btn")?.addEventListener("click", close);
        overlay.addEventListener("click", close);
 
    }

    showOnboardingOnce();

    // ----------------------------
    // 12) REFRESH SCREEN ON DEVICE ORIENTATION CHANGE 
    // ----------------------------
    function getOrientationKey() {
    return window.matchMedia("(orientation: portrait)").matches
        ? "portrait"
        : "landscape";
    }

    function reloadOnOrientationChange() {
    let lastOrientation = getOrientationKey();

    window.addEventListener("resize", function () {
        const currentOrientation = getOrientationKey();

        if (currentOrientation !== lastOrientation) {
        lastOrientation = currentOrientation;
        window.location.reload();
        }
    });
    }

    reloadOnOrientationChange();

    // 14) PAGE WIDTH THRESHOLD WATCH @ 768px, NOT EVERY RESIZE EVENT
    if (!isMobile()) {
        let wasAbove768 = window.innerWidth > 768;
        window.addEventListener("resize", function () {
            const isAbove768 = window.innerWidth > 768;

            if (isAbove768 !== wasAbove768) {
                window.location.reload();
            }
            if (isAbove768 === wasAbove768) {
                window.location.reload();
            }

            wasAbove768 = isAbove768;
        });
    }

  </script>
